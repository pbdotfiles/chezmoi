# --- Appearance ---
font_family JetBrainsMono Nerd Font
font_size 11.0
window_padding_width 0


# FlogSymbols are required to properly display git log history in nvim's Flog plugin
# mkdir -p ~/.local/share/fonts
# cd ~/.local/share/fonts
# wget https://github.com/rbong/flog-symbols/raw/main/FlogSymbols.ttf
# fc-cache -fv
symbol_map U+F0000-U+FFFFF FlogSymbols

# Slightly transparent background (Optional, looks modern)
background_opacity 0.98

# --- UX ---
confirm_os_window_close 0

# (Optional) Hide the top title bar if you want a cleaner look
# hide_window_decorations yes

# This allows remote programs to write to your local clipboard
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask

# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME
