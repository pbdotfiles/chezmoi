# Configuration file recommended by Gemini

# Fix Neovim escape lag
set -sg escape-time 0

# Enable mouse support
set -g mouse on

# Fix colors for Kitty + Neovim
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Open new windows/panes in the current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Optional: Set the status bar to be more minimal
# set -g status-style bg=default  

# Allow tmux to pass clipboard data to the terminal
set -s set-clipboard on

# Allow programs inside tmux to send escape sequences (like OSC 52) directly
# to the outer terminal. Required for clipboard forwarding through nested tmux
# (e.g. SSH into a remote machine that also runs tmux).
set -g allow-passthrough on

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

# Reload tmux config
bind r source-file ~/.tmux.conf \; display "Tmux Config Reloaded!"


set -ga terminal-overrides ",xterm-256color:Tc"
set -q -g utf8 on
set -wq -g utf8 on
